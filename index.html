<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NowCore</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐈‍⬛</text></svg>">

<script>
(function() {
    var t = localStorage.getItem('theme');
    if (!t) {
        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', t);
})();
</script>

<style>
    :root {
        --bg: #ffffff;
        --text: #1a1a1a;
        --text-muted: rgba(0,0,0,0.45);
        --text-dim: rgba(0,0,0,0.25);
        --btn-bg: rgba(0,0,0,0.06);
        --btn-border: rgba(0,0,0,0.10);
        --btn-hover: rgba(0,0,0,0.10);
        --btn-color: #1a1a1a;
        --img-border: rgba(0,0,0,0.08);
        --footer-color: rgba(0,0,0,0.15);
    }

    [data-theme="dark"] {
        --bg: rgb(16, 16, 16);
        --text: #ffffff;
        --text-muted: rgba(255,255,255,0.45);
        --text-dim: rgba(255,255,255,0.25);
        --btn-bg: rgba(255,255,255,0.06);
        --btn-border: rgba(255,255,255,0.10);
        --btn-hover: rgba(255,255,255,0.10);
        --btn-color: #ffffff;
        --img-border: rgba(255,255,255,0.08);
        --footer-color: rgba(255,255,255,0.15);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: "Cascadia Code", Consolas, monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background .3s, color .3s;
    }

    main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 80px 20px;
    }

    .content {
        width: 100%;
        max-width: 650px;
    }

    .title-row {
        display: flex;
        align-items: center;
        gap: 32px;
        margin-bottom: 24px;
    }

    .title-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    h1 {
        font-size: 40px;
        font-weight: 600;
        letter-spacing: -1px;
    }

    .beta {
        display: inline-flex;
        gap: 1px;
        align-items: baseline;
    }

    .beta span {
        animation: beta-float 2s infinite;
        opacity: 0;
        color: var(--text-muted);
        font-weight: 400;
    }

    .beta span:nth-child(1) {
        animation-delay: 0s;
        font-size: 14px;
    }

    .beta span:nth-child(2) {
        animation-delay: 0.3s;
        font-size: 16px;
    }

    .beta span:nth-child(3) {
        animation-delay: 0.6s;
        font-size: 18px;
    }

    .beta span:nth-child(4) {
        animation-delay: 0.9s;
        font-size: 20px;
    }

    @keyframes beta-float {
        0% {
            opacity: 0;
            transform: translateY(0);
        }
        20% {
            opacity: 1;
        }
        80% {
            opacity: 1;
        }
        100% {
            opacity: 0;
            transform: translateY(-10px);
        }
    }

    .cat {
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.1;
        white-space: pre;
        user-select: none;
    }

    .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 40px;
    }

    .btn {
        width: 39px;
        height: 39px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        border-radius: 8px;
        color: var(--btn-color);
        text-decoration: none;
        transition: .2s ease;
    }

    .btn:hover {
        background: var(--btn-hover);
    }

    .btn svg {
        opacity: .8;
    }

    .footer-theme {
        background: none;
        border: none;
        color: inherit;
        cursor: pointer;
        padding: 0;
        vertical-align: middle;
        display: inline-flex;
        align-items: center;
        transition: opacity .2s;
    }

    .footer-theme:hover {
        opacity: .6;
    }

    .btn-changelog {
        cursor: pointer;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 100;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(4px);
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal {
        background: var(--bg);
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        width: 380px;
        max-width: 90vw;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
    }

    .modal-title {
        font-size: 16px;
        font-weight: 600;
    }

    .modal-close {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 22px;
        cursor: pointer;
        line-height: 1;
        padding: 0 4px;
        transition: color .2s;
    }

    .modal-close:hover {
        color: var(--text);
    }

    .modal-body {
        padding: 20px;
    }

    .cl-date {
        font-size: 11px;
        color: var(--text-dim);
        margin-bottom: 4px;
    }

    .cl-version {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 12px;
    }

    .cl-list {
        list-style: none;
        padding: 0;
    }

    .cl-list li {
        font-size: 13px;
        color: var(--text-muted);
        padding: 4px 0;
        padding-left: 14px;
        position: relative;
    }

    .cl-list li::before {
        content: "·";
        position: absolute;
        left: 0;
        color: var(--text-dim);
    }

    .icon-sun,
    .icon-moon {
        display: none;
    }

    /* Светлая тема — показываем луну */
    .footer-theme .icon-moon {
        display: inline-flex;
    }

    /* Тёмная тема — показываем солнце */
    [data-theme="dark"] .footer-theme .icon-moon {
        display: none;
    }

    [data-theme="dark"] .footer-theme .icon-sun {
        display: inline-flex;
    }

    .meta {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.6;
    }

    .menu-image {
        width: 100%;
        display: block;
        border-radius: 10px;
        border: 1px solid var(--img-border);
    }

    footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: var(--footer-color);
    }

    @media (max-width: 600px) {
        .title-row {
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        h1 {
            font-size: 32px;
        }

        .actions {
            flex-direction: column;
            align-items: flex-start;
        }
    }
</style>
</head>
<body>

<main>
    <div class="content">

        <div class="title-row">

            <div class="title-left">
                <h1>NowCore</h1>
                <pre class="cat">     \    /\
      )  ( ')
     (  /  )
      \(__)|</pre>
            </div>

            <div class="beta">
                <span>B</span>
                <span>e</span>
                <span>t</span>
                <span>a</span>
            </div>

        </div>

        <div class="actions">

            <!-- Скачать -->
            <a href="https://github.com/lazxvll/nowcore/releases/download/v0.0.1/NowCore.exe" class="btn" download aria-label="Скачать">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 4V16M12 16L7 11M12 16L17 11M5 20H19"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </a>

            <!-- Discord -->
            <a href="https://discord.gg/WaGBs5jgea" class="btn" target="_blank" aria-label="Discord">
                <svg viewBox="0 0 127.14 96.36" width="16" height="16" fill="currentColor">
                    <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0 105.89 105.89 0 0 0 19.39 8.09C2.79 32.65-1.71 56.6.54 80.21A105.73 105.73 0 0 0 32.71 96.36a77.7 77.7 0 0 0 6.89-11.25 68.42 68.42 0 0 1-10.84-5.18c.91-.66 1.8-1.34 2.66-2A75.57 75.57 0 0 0 95.72 77.9c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.86 5.19 77 77 0 0 0 6.89 11.24A105.25 105.25 0 0 0 126.6 80.22C129.24 52.84 122.09 29.11 107.7 8.07ZM42.45 65.69C35.94 65.69 30.6 59.76 30.6 52.5S35.84 39.31 42.45 39.31 54.3 45.3 54.3 52.5 49 65.69 42.45 65.69Zm42.24 0c-6.51 0-11.85-5.93-11.85-13.19S78.08 39.31 84.69 39.31 96.54 45.3 96.54 52.5 91.3 65.69 84.69 65.69Z"/>
                </svg>
            </a>

            <!-- Donate -->
            <a href="https://steamcommunity.com/tradeoffer/new/?partner=324269455&token=09MTw2th" class="btn" target="_blank" aria-label="Donate">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
            </a>

            <!-- Changelog -->
            <button class="btn btn-changelog" id="changelogBtn" title="Changelog" aria-label="Changelog">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
            </button>

            <!-- Changelog Modal -->
            <div class="modal-overlay" id="changelogModal">
                <div class="modal">
                    <div class="modal-header">
                        <span class="modal-title">Changelog</span>
                        <button class="modal-close" id="changelogClose">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="cl-date">24.06.2026</div>
                        <div class="cl-version">v0.0.1 (beta)</div>
                        <ul class="cl-list">
                            <li>Первый релиз</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="meta">
                Win 10/11<br>
                Version 0.0.1 (beta)
            </div>

        </div>

        <img src="https://github.com/lazxvll/nowcore/blob/main/menu_dark.png?raw=true" alt="NowCore" class="menu-image" id="menuImg" style="opacity:0">

    </div>
</main>

<footer>
    NowCore · 2026 ·
    <button class="footer-theme" id="themeToggle" aria-label="Сменить тему">
        <svg class="icon-sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>
</footer>

<script>
(function() {
    var toggle = document.getElementById('themeToggle');
    var img = document.getElementById('menuImg');
    var saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

    function apply(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        img.src = theme === 'dark'
            ? 'https://github.com/lazxvll/nowcore/blob/main/menu_dark.png?raw=true'
            : 'https://github.com/lazxvll/nowcore/blob/main/menu_white.png?raw=true';
        img.style.opacity = '1';
    }

    apply(saved);

    toggle.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        apply(next);
    });

    var changelogBtn = document.getElementById('changelogBtn');
    var changelogModal = document.getElementById('changelogModal');
    var changelogClose = document.getElementById('changelogClose');

    changelogBtn.addEventListener('click', function() {
        changelogModal.classList.add('active');
    });

    changelogClose.addEventListener('click', function() {
        changelogModal.classList.remove('active');
    });

    changelogModal.addEventListener('click', function(e) {
        if (e.target === changelogModal) {
            changelogModal.classList.remove('active');
        }
    });
})();
</script>

</body>
</html>
