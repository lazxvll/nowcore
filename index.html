<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NowCore</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: rgb(16, 16, 16);
        color: #fff;
        font-family: "Cascadia Code", Consolas, monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 80px 20px;
    }

    .content {
        width: 100%;
        max-width: 650px;
    }

    .title-row {
        display: flex;
        align-items: center;
        gap: 32px;
        margin-bottom: 24px;
    }

    .title-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    h1 {
        font-size: 40px;
        font-weight: 600;
        letter-spacing: -1px;
    }

    .beta {
        display: inline-flex;
        gap: 1px;
        align-items: baseline;
    }

    .beta span {
        animation: beta-float 2s infinite;
        opacity: 0;
        color: rgba(255,255,255,0.55);
        font-weight: 400;
    }

    .beta span:nth-child(1) {
        animation-delay: 0s;
        font-size: 14px;
    }

    .beta span:nth-child(2) {
        animation-delay: 0.3s;
        font-size: 16px;
    }

    .beta span:nth-child(3) {
        animation-delay: 0.6s;
        font-size: 18px;
    }

    .beta span:nth-child(4) {
        animation-delay: 0.9s;
        font-size: 20px;
    }

    @keyframes beta-float {
        0% {
            opacity: 0;
            transform: translateY(0);
        }
        20% {
            opacity: 1;
        }
        80% {
            opacity: 1;
        }
        100% {
            opacity: 0;
            transform: translateY(-10px);
        }
    }

    .cat {
        color: rgba(255,255,255,0.45);
        font-size: 13px;
        line-height: 1.1;
        white-space: pre;
        user-select: none;
    }

    .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 40px;
    }

    .btn {
        width: 39px;
        height: 39px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 8px;
        color: #fff;
        text-decoration: none;
        transition: .2s ease;
    }

    .btn:hover {
        background: rgba(255,255,255,0.10);
    }

    .btn svg {
        opacity: .8;
    }

    .meta {
        font-size: 12px;
        color: rgba(255,255,255,0.25);
        line-height: 1.6;
    }

    .menu-image {
        width: 100%;
        display: block;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: rgba(255,255,255,0.15);
    }

    @media (max-width: 600px) {
        .title-row {
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        h1 {
            font-size: 32px;
        }

        .actions {
            flex-direction: column;
            align-items: flex-start;
        }
    }
</style>
</head>
<body>

<main>
    <div class="content">

        <div class="title-row">

            <div class="title-left">
                <h1>NowCore</h1>
                <pre class="cat">     \    /\
      )  ( ')
     (  /  )
